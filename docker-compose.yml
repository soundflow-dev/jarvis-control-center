services:
  backend:
    build:
      context: ./backend
    environment:
      DATA_DIR: /data
      APP_SECRET_KEY: ${APP_SECRET_KEY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - jarvis-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jarvis-data:
